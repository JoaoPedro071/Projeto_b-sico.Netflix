<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Perfis - Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Netflix</h1>
        <nav>
            <a href="index.html">Voltar</a>
        </nav>
    </header>
    <main>
        <section class="manage-profiles">
            <h2>Gerenciar perfis</h2>
            <p>Selecione um perfil para editar, adicionar um novo ou remover.</p>
            <ul class="profile-list">
                <li class="profile">
                    <img src="./assets/perfil 1.jpg.jpg" alt="Perfil Jotape">
                    <p>Jotape</p>
                    <button class="profile-action">Editar</button>
                </li>
                <li class="profile">
                    <img src="./assets/perfil 2.jpeg.jpeg" alt="Perfil Elzi">
                    <p>Elzi</p>
                    <button class="profile-action">Editar</button>
                </li>
                <li class="profile">
                    <img src="./assets/perfil 3.jpg.jpg" alt="Perfil Aline">
                    <p>Aline</p>
                    <button class="profile-action">Editar</button>
                </li>
                <li class="profile">
                    <img src="./assets/perfil 4.jpeg.jpeg" alt="Perfil Kids">
                    <p>Kids</p>
                    <button class="profile-action">Editar</button>
                </li>
            </ul>
            <button class="add-profile">Adicionar perfil</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
